run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - whitespace
    - unconvert
    - unparam
    - noctx
    - bodyclose

linters-settings:
  goimports:
    local-prefixes: github.com/hillscheck

issues:
  exclude-rules:
    # Test files can use t.Fatal, os.Exit, etc.
    - path: _test\.go
      linters:
        - errcheck
    # main.go has intentional log.Fatal calls
    - path: cmd/server/main\.go
      linters:
        - unparam
